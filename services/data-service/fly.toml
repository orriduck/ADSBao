app = "adsbao-data-service"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  MAX_ACTIVE_CHANNELS = "250"
  MAX_SOCKET_SUBSCRIPTIONS = "96"
  MIN_POLL_INTERVAL_MS = "1000"
  MAX_POLL_INTERVAL_MS = "1800000"
  POLL_JITTER_RATIO = "0.1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
